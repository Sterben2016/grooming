services:
  - type: web
    name: grooming-bot
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m gbot.main"
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///grooming.db
      - key: PYTHON_VERSION
        value: 3.11.9
